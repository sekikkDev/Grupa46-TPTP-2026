        <div class="contact-hero">
            <h1>Kontaktirajte nas</h1>
            <p>Rado ćemo odgovoriti na sva vaša pitanja</p>
        </div>

        <div class="contact-info-cards">
            <div class="info-card">
                <div class="info-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="currentColor"><path d="M61.4 64C27.5 64 0 91.5 0 125.4 0 126.3 0 127.1 .1 128L0 128 0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-256-.1 0c0-.9 .1-1.7 .1-2.6 0-33.9-27.5-61.4-61.4-61.4L61.4 64zM464 192.3L464 384c0 8.8-7.2 16-16 16L64 400c-8.8 0-16-7.2-16-16l0-191.7 154.8 117.4c31.4 23.9 74.9 23.9 106.4 0L464 192.3zM48 125.4C48 118 54 112 61.4 112l389.2 0c7.4 0 13.4 6 13.4 13.4 0 4.2-2 8.2-5.3 10.7L280.2 271.5c-14.3 10.8-34.1 10.8-48.4 0L53.3 136.1c-3.3-2.5-5.3-6.5-5.3-10.7z"/></svg>

                <h4>Telefon</h4>

        <div class="form-wrapper">
            <h2>Pošaljite nam poruku</h2>
            <form id="contact-form" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ime">Ime <span class="required">*</span></label>
                        <input type="text" id="ime" placeholder="Unesite vaše ime">
                        <span class="error-msg" id="ime-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="prezime">Prezime <span class="required">*</span></label>
                        <input type="text" id="prezime" placeholder="Unesite vaše prezime">
                        <span class="error-msg" id="prezime-error"></span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="text" id="email" placeholder="vas.email@example.com">
                        <span class="error-msg" id="email-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="telefon">Telefon <span class="required">*</span></label>
                        <input type="text" id="telefon" placeholder="+381 11 123 4567">
                        <span class="error-msg" id="telefon-error"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tema">Tema upita <span class="required">*</span></label>
                    <select id="tema">
                        <option value="">Izaberite temu...</option>
                        <option value="narudzba">Nova narudžba</option>
                        <option value="upit">Opći upit</option>
                        <option value="reklamacija">Reklamacija</option>
                        <option value="saradnja">Saradnja</option>
                    </select>
                    <span class="error-msg" id="tema-error"></span>
                </div>
                <div class="form-group">
                    <label for="poruka">Poruka <span class="required">*</span></label>
                    <textarea id="poruka" placeholder="Opišite vaš upit ili zahtev..."></textarea>
                    <span class="error-msg" id="poruka-error"></span>
                </div>
                <div class="form-btns">
                    <button type="submit" class="btn-send">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                        Pošalji poruku
                    </button>
                    <button type="button" class="btn-reset" id="btn-reset">Resetuj</button>
                </div>
            </form>
            <div class="success-msg" id="success-msg"></div>
        </div>
    </main>
